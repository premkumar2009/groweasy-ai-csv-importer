services:
  backend:
    build:
      context: ./backend
    environment:
      - PORT=5000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - backend
    ports:
      - "3000:3000"
